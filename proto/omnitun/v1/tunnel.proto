syntax = "proto3";

package omnitun.v1;

option go_package = "github.com/omnitun/omnitun/proto/omnitun/v1;omnitunv1";

import "google/protobuf/timestamp.proto";
import "omnitun/v1/common.proto";

service TunnelService {
  rpc CreateTunnel(CreateTunnelRequest) returns (CreateTunnelResponse);
  rpc GetTunnel(GetTunnelRequest) returns (GetTunnelResponse);
  rpc ListTunnels(ListTunnelsRequest) returns (ListTunnelsResponse);
  rpc UpdateTunnel(UpdateTunnelRequest) returns (UpdateTunnelResponse);
  rpc DeleteTunnel(DeleteTunnelRequest) returns (DeleteTunnelResponse);
  rpc StartTunnel(StartTunnelRequest) returns (StartTunnelResponse);
  rpc StopTunnel(StopTunnelRequest) returns (StopTunnelResponse);
  rpc GetTunnelStats(GetTunnelStatsRequest) returns (GetTunnelStatsResponse);
}

message Tunnel {
  string id = 1;
  string organization_id = 2;
  string workspace_id = 3;
  string name = 4;
  string slug = 5;
  string protocol = 6;
  int32 local_port = 7;
  string local_host = 8;
  string custom_domain = 9;
  string tls_mode = 10;
  string auth_mode = 11;
  string status = 12;
  int64 bytes_in_total = 13;
  int64 bytes_out_total = 14;
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp updated_at = 16;
}

message CreateTunnelRequest {
  string workspace_id = 1;
  string name = 2;
  string protocol = 3;
  int32 local_port = 4;
  string local_host = 5;
  string custom_domain = 6;
  string tls_mode = 7;
  string auth_mode = 8;
}

message CreateTunnelResponse {
  Tunnel tunnel = 1;
}

message GetTunnelRequest {
  string tunnel_id = 1;
}

message GetTunnelResponse {
  Tunnel tunnel = 1;
}

message ListTunnelsRequest {
  string workspace_id = 1;
  int32 limit = 2;
  string cursor = 3;
}

message ListTunnelsResponse {
  repeated Tunnel tunnels = 1;
  PaginationResponse pagination = 2;
}

message UpdateTunnelRequest {
  string tunnel_id = 1;
  optional string name = 2;
  optional string auth_mode = 3;
  optional int32 max_connections = 4;
}

message UpdateTunnelResponse {
  Tunnel tunnel = 1;
}

message DeleteTunnelRequest {
  string tunnel_id = 1;
}

message DeleteTunnelResponse {
  string message = 1;
}

message StartTunnelRequest {
  string tunnel_id = 1;
}

message StartTunnelResponse {
  string message = 1;
  string relay_address = 2;
}

message StopTunnelRequest {
  string tunnel_id = 1;
}

message StopTunnelResponse {
  string message = 1;
}

message GetTunnelStatsRequest {
  string tunnel_id = 1;
  string period = 2;
}

message TunnelStats {
  int64 bytes_in = 1;
  int64 bytes_out = 2;
  int32 active_connections = 3;
  int32 total_requests = 4;
}

message GetTunnelStatsResponse {
  TunnelStats stats = 1;
}
