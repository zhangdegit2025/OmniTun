# OmniTun port override - avoids conflicts with existing services
version: "3.9"

services:
  postgres:
    ports:
      - "5433:5432"

  valkey:
    ports:
      - "6380:6379"

  nats:
    ports:
      - "4223:4222"
      - "8223:8222"

  clickhouse:
    ports:
      - "8124:8123"
      - "9001:9000"

  minio:
    ports:
      - "9002:9000"
      - "9003:9001"

  api-gateway:
    ports:
      - "8081:8080"
      - "9444:9443"
      - "9091:9090"

  orchestrator:
    ports:
      - "9003:9002"
      - "9191:9090"

  relay:
    ports:
      - "4443:443"
      - "4444:443/udp"
      - "9391:9090"

  web:
    ports:
      - "3001:3000"
