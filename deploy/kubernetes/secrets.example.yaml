apiVersion: v1
kind: Secret
metadata:
  name: omnitun-secrets
  namespace: omnitun-system
  labels:
    app.kubernetes.io/part-of: omnitun
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  postgres-user: "omnitun"
  postgres-password: "changeme"
  postgres-db: "omnitun"
  database-url: "postgres://omnitun:changeme@postgres.omnitun-system:5432/omnitun?sslmode=disable"
  valkey-password: ""
  clickhouse-user: "default"
  clickhouse-password: ""
  minio-root-user: "admin"
  minio-root-password: "changeme"
  jwt-private-key: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_WITH_YOUR_ACTUAL_PRIVATE_KEY
    -----END RSA PRIVATE KEY-----
  jwt-public-key: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_WITH_YOUR_ACTUAL_PUBLIC_KEY
    -----END PUBLIC KEY-----
  api-tls-cert: ""
  api-tls-key: ""
  relay-tls-cert: ""
  relay-tls-key: ""
  webhook-signing-secret: ""
